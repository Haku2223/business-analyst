<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Business Analyst Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1f2e 0%, #2563eb 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: #1a1f2e; letter-spacing: -.02em; }
    .login-logo p { color: #6b7280; font-size: 13px; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    input[type=password], input[type=text] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 14px; color: #1a1f2e;
      transition: border-color .15s;
    }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .btn-login {
      width: 100%; padding: 11px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 6px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1d4ed8; }
    .error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 14px; text-align: center; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <h1>BA Agent</h1>
    <p>Swedish Business Acquisition Tool</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="form-group">
      <label for="password">Team Password</label>
      <input type="password" id="password" name="password" placeholder="Enter team password" required autofocus />
    </div>
    <div class="form-group">
      <label for="display_name">Your Name <span style="color:#9ca3af;font-weight:400">(optional — used for attribution)</span></label>
      <input type="text" id="display_name" name="display_name" placeholder="e.g. Hawaar, Anna…" maxlength="50" />
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  <p class="hint">Single shared team password · 30-day session</p>
</div>
</body>
</html>
